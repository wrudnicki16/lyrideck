appId: host.exp.exponent
---
# Journey 4a: Batch review mode (Match Cards)
# Precondition: Deck with pending cards exists, Spotify connected
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 5000
- openLink: "${EXPO_URL}"

# Connect to Spotify (fails if not already authenticated)
- tapOn: "Connect Spotify"
- extendedWaitUntil:
    visible: "Agree"
    timeout: 5000
    optional: true
- tapOn:
    text: "Agree"
    optional: true

# Navigate to first deck
- tapOn:
    text: ".*cards"
    index: 0

# Tap "Match Cards" to enter review mode
- tapOn: "Match Cards"

# Assert SongCandidatesScreen opens in review mode
- assertVisible: "^[0-9]+ cards? remaining"
- assertVisible: "Search Spotify..."

# Wait for results
- extendedWaitUntil:
    visible: "Select"
    timeout: 10000

# Select a track → CaptureScreen
- tapOn:
    text: "Select"
    index: 0

# Assert on CaptureScreen
- assertVisible: "Open in Spotify"
- assertVisible: "Mark at 0:00"

# Mark a timestamp
- tapOn: "Mark at 0:00"
- assertVisible: "Saved Clips"

# Assert "Next Card" button is visible in review mode
- assertVisible: "Next Card"
- assertVisible: "^[0-9]+ cards? remaining"

# Tap "Next Card" to advance to next pending card
- tapOn: "Next Card"

# Should auto-advance to next card's SongCandidatesScreen
- assertVisible: "Search Spotify..."

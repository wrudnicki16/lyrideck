appId: host.exp.exponent
---
# Journey 3b: Manual timestamp capture on CaptureScreen
# Precondition: On CaptureScreen with a selected track
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Connect to Spotify (fails if not already authenticated)
- tapOn:
    id: "connect-spotify"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: "50%,79%"
    optional: true

# Dismiss Expo Go developer menu
- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
    optional: true
- tapOn:
    point: "90%,35%"
    optional: true

# Navigate to a deck → card → track → CaptureScreen
- tapOn:
    id: "deck-item"
    index: 0
- tapOn:
    id: "filter-pending"
- tapOn:
    id: "card-item"
    index: -1
- extendedWaitUntil:
    visible: "Select"
    timeout: 10000
- tapOn:
    id: "select-track"
    index: 0

# Assert on CaptureScreen
- assertVisible: "Open in Spotify"

# Tap "Enter time manually"
- tapOn:
    id: "enter-time-manually"

# Minutes input auto-focuses, just type
- hideKeyboard
- inputText: "1"

# Tap seconds field and type
- tapOn:
    id: "input-seconds"
- inputText: "30"

# Tap note field and type
- tapOn:
    id: "input-note"
- inputText: "chorus"

# Tap Save
- tapOn:
    id: "picker-save"

# For good measure, tap Save again if it is still visible
- tapOn:
    id: "picker-save"
    optional: true

# Assert saved clip appears
- assertVisible: "Saved Clips"
- assertVisible: "1:30"
- assertVisible: "chorus"

appId: host.exp.exponent
---
# Journey 3c: Mark timestamp at 0:00
# Precondition: On CaptureScreen with a selected track
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Connect to Spotify (fails if not already authenticated)
- tapOn:
    id: "connect-spotify"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: "50%,79%"
    optional: true

# Dismiss Expo Go developer menu
- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
    optional: true
- tapOn:
    point: "90%,35%"
    optional: true

# Navigate to a deck → card → track → CaptureScreen
- tapOn:
    id: "deck-item"
    index: 0
- tapOn:
    id: "filter-pending"
- tapOn:
    id: "card-item"
    index: -1
- extendedWaitUntil:
    visible: "Select"
    timeout: 10000
- tapOn:
    id: "select-track"
    index: 0

# Assert on CaptureScreen
- assertVisible: "Mark at 0:00"

# Tap "Mark at 0:00"
- tapOn:
    id: "mark-at-zero"

# Assert clip saved
- assertVisible: "Saved Clips"
- assertVisible: "0:00"

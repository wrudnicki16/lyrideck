appId: host.exp.exponent
---
# Journey 1a: Import a CSV deck
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Dismiss Expo Go developer menu
- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    point: "90%,35%"
    optional: true

# Assert DeckImportScreen initial state
- assertVisible: "Anki2Spotify"
- assertVisible: "No decks yet. Import a file to get started."

# Tap Import Deck → file picker opens
- tapOn:
    id: "import-deck"

# Note: File picker interaction is OS-level and cannot be fully automated.
# In a real test environment, you'd use `maestro mock` or pre-seed the file.
# For now, we assert the button is tappable and the picker opens.

# Go back to the main screen
- back

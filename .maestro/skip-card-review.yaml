appId: host.exp.exponent
---
# Journey 4b: Skip a card in review mode
# Precondition: Deck with pending cards exists, Spotify connected
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Connect to Spotify (fails if not already authenticated)
- tapOn:
    id: "connect-spotify"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: "50%,79%"
    optional: true

# Dismiss Expo Go developer menu
- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
    optional: true
- tapOn:
    point: "90%,35%"
    optional: true

# Navigate to first deck
- tapOn:
    id: "deck-item"
    index: 0

# Tap "Match Cards" to enter review mode
- tapOn:
    id: "match-cards-btn"

# Assert review mode with Skip button
- assertVisible: "Skip"
- assertVisible:
    text: "^[0-9]+ cards? remaining"

# Tap Skip to skip the current card
- tapOn:
    id: "skip-btn"

# Should auto-advance to next pending card
- assertVisible: "Search Spotify..."

appId: host.exp.exponent
---
# Journey 4b: Skip a card in review mode
# Precondition: Deck with pending cards exists, Spotify connected
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 5000
- openLink: "${EXPO_URL}"

# Connect to Spotify (fails if not already authenticated)
- tapOn: "Connect Spotify"
- extendedWaitUntil:
    visible: "Agree"
    timeout: 5000
    optional: true
- tapOn:
    text: "Agree"
    optional: true

# Navigate to first deck
- tapOn:
    text: ".*cards"
    index: 0

# Tap "Match Cards" to enter review mode
- tapOn: "Match Cards"

# Assert review mode with Skip button
- assertVisible: "Skip"
- assertVisible:
    text: "^[0-9]+ cards? remaining"

# Tap Skip to skip the current card
- tapOn: "Skip"

# Should auto-advance to next pending card
- assertVisible: "Search Spotify..."

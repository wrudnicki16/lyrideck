appId: host.exp.exponent
---
# Journey 5c: Create playlist with filters applied
# Precondition: Deck with matched cards exists, Spotify connected
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Navigate to first deck
- tapOn:
    id: "deck-item"
    index: 0

# Apply "Matched" filter
- tapOn:
    id: "filter-matched"

# Toggle "Lyrics" search on
- tapOn:
    id: "filter-lyrics"

# Tap "Playlist"
- tapOn:
    id: "playlist-btn"

# Assert modal shows filtered card count (not total)
- assertVisible: "Create Playlist"

# The modal body should reference filtered count
- tapOn:
    id: "modal-confirm"

# Assert name modal
- assertVisible: "Playlist Name"

# Cancel to return
- tapOn:
    id: "modal-cancel"

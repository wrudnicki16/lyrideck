appId: host.exp.exponent
---
# Journey 2b: Filter pills on CardQueueScreen
# Precondition: Navigate to CardQueueScreen with cards
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Dismiss Expo Go developer menu
- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
    optional: true
- tapOn:
    point: "90%,35%"
    optional: true

# Navigate to first deck
- tapOn:
    id: "deck-item"
    index: 0

# All filter should be active by default
- assertVisible: "All"

# Tap Pending pill
- tapOn:
    id: "filter-pending"

# Tap Matched pill
- tapOn:
    id: "filter-matched"

# Tap Skipped pill
- tapOn:
    id: "filter-skipped"

# Tap All pill to reset
- tapOn:
    id: "filter-all"

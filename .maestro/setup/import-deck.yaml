appId: host.exp.exponent
---
# Setup: Import test .apkg deck (reusable, no "empty DB" assertions)
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Dismiss Expo Go developer menu
- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    point: "90%,35%"
    optional: true

# Tap Import Deck → opens OS file picker
- tapOn:
    id: "import-deck"

# Android: select file from document picker (skipped on iOS)
- runFlow:
    file: ../partials/select-apkg-file.yaml
    env:
      FILE_NAME: "test-deck"
    optional: true

# Post-picker: select decks and confirm import
- assertVisible:
    text: "Select Decks to Import"
    optional: true

# Select all decks (default) and import
- tapOn:
    text: "Import [0-9]+ Decks?"
    optional: true

# Confirm import on card preview
- tapOn:
    id: "confirm-import"
    optional: true

# Dismiss success alert
- assertVisible:
    text: "Success"
    optional: true
- tapOn:
    text: "OK"
    optional: true

# Assert back on deck list
- assertVisible:
    text: "Your Decks"
    optional: true

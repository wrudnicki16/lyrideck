appId: host.exp.exponent
---
# Setup: Match all cards in first deck with Spotify tracks
# Precondition: Deck imported, Spotify connected
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Dismiss Expo Go developer menu
- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    point: "90%,35%"
    optional: true

# Connect to Spotify
- tapOn:
    id: "connect-spotify"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: "50%,79%"
    optional: true

# Navigate to first deck if not already on it
- tapOn:
    id: "deck-item"
    index: 0
    optional: true

# Enter review mode
- tapOn:
    id: "match-cards-btn"

# Wait for search results
- extendedWaitUntil:
    visible: "Select"
    timeout: 10000

# Card 1: Select track and mark at 0:00
- tapOn:
    id: "select-track"
    index: 0
- tapOn:
    id: "mark-at-zero"

# Card 2: advance and match
- tapOn:
    id: "next-card"
    optional: true
- extendedWaitUntil:
    visible: "Select"
    timeout: 10000
    optional: true
- tapOn:
    id: "select-track"
    index: 0
    optional: true
- tapOn:
    id: "mark-at-zero"
    optional: true

# Card 3: advance and match or end of deck
- tapOn:
    id: "next-card"
    optional: true
- runFlow:
    when:
      visible: "All done!"
    commands:
      - tapOn: "OK"
- runFlow:
    when:
      visible: "Select"
    commands:
      - tapOn:
        id: "select-track"
        index: 0
      - tapOn:
        id: "mark-at-zero"

# Go back to deck list
- back
- back

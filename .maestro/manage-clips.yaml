appId: host.exp.exponent
---
# Journey 3d: Manage saved clips on CaptureScreen
# Precondition: On CaptureScreen with at least one saved clip
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Connect to Spotify (fails if not already authenticated)
- tapOn:
    id: "connect-spotify"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: "50%,79%"
    optional: true

# Navigate to first deck
- tapOn:
    id: "deck-item"
    index: 0
- tapOn:
    id: "filter-pending"
- tapOn:
    id: "card-item"
    index: -1
    optional: true

# If no "Select" visible, card is already matched — go to Matched tab instead
- runFlow:
    when:
      notVisible: "Select"
    commands:
      - tapOn:
          id: "filter-matched"
      - tapOn:
          id: "card-item"
          index: -1

# Wait for search results
- extendedWaitUntil:
    visible: "Select"
    timeout: 10000
- tapOn:
    id: "select-track"
    index: 0

# Save a clip first
- tapOn:
    id: "mark-at-zero"
- assertVisible: "Saved Clips"

# Tap "Copy" on the clip
- tapOn:
    id: "copy-clip"

# Assert "Copied" alert
- assertVisible: "Copied"
- tapOn: "OK"

# Tap "Del" on the clip
- tapOn:
    id: "delete-clip"

# Assert delete confirmation
- assertVisible: "Remove this timestamp?"
- assertVisible: "Cancel"
- assertVisible: "Delete"

# Confirm deletion
- tapOn: "Delete"

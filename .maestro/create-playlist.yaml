appId: host.exp.exponent
---
# Journey 5a: Create a Spotify playlist
# Precondition: Deck with matched cards exists, Spotify connected
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 5000
- openLink: "${EXPO_URL}"

# Connect to Spotify (fails if not already authenticated)
- tapOn: "Connect Spotify"
- extendedWaitUntil:
    visible: "Agree"
    timeout: 5000
    optional: true
- tapOn:
    text: "Agree"
    optional: true

# Navigate to first deck
- tapOn:
    text: ".*cards"
    index: 0

# Tap "Playlist" button
- tapOn: "Playlist"

# Assert first confirmation modal
- assertVisible: "Create Playlist"
- assertVisible: "Adjust your filters to change which songs are included."

# Tap "Continue"
- tapOn: "Continue"

# Assert playlist name modal
- assertVisible: "Playlist Name"
- assertVisible: "Enter playlist name"

# Clear and type custom playlist name
- tapOn: "Enter playlist name"
- eraseText: 50
- inputText: "My Test Playlist"

# Tap "Create"
- tapOn: "Create"

# Assert PlaylistProgressScreen
- assertVisible: "My Test Playlist"
- assertVisible:
    text: "Resolving tracks..."
    optional: true

# Wait for completion
- extendedWaitUntil:
    visible: "Playlist created with [0-9]+ tracks?!"
    timeout: 30000

# Assert success state
- assertVisible: "Open in Spotify"
- assertVisible: "Back to Decks"

# Tap "Back to Decks" to return
- tapOn: "Back to Decks"

# Assert back on DeckImportScreen
- assertVisible: "Anki2Spotify"

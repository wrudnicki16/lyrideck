appId: host.exp.exponent
---
# Journey 2c: Search field toggle on CardQueueScreen
# Precondition: Navigate to CardQueueScreen with cards
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Dismiss Expo Go developer menu
- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
    optional: true
- tapOn:
    point: "90%,35%"
    optional: true

# Navigate to first deck
- tapOn:
    id: "deck-item"
    index: 0

# Assert search field section
- assertVisible: "Search by:"

# Tap Front pill
- tapOn:
    id: "filter-front"

# Tap Back pill
- tapOn:
    id: "filter-back"

# Tap Lyrics pill to toggle on
- tapOn:
    id: "filter-lyrics"

# Tap Lyrics pill again to toggle off
- tapOn:
    id: "filter-lyrics"

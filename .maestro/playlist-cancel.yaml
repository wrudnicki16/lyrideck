appId: host.exp.exponent
---
# Journey 5b: Cancel playlist creation at each step
# Precondition: Deck with cards exists
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Dismiss Expo Go developer menu
- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
    optional: true
- tapOn:
    point: "90%,35%"
    optional: true

# Navigate to first deck
- tapOn:
    id: "deck-item"
    index: 0

# Tap "Playlist" → first modal appears
- tapOn:
    id: "playlist-btn"
- assertVisible: "Create Playlist"

# Cancel first modal
- tapOn:
    id: "modal-cancel"

# Assert modal dismissed — still on CardQueueScreen
- assertVisible: "Playlist"

# Tap "Playlist" again → Continue → name modal
- tapOn:
    id: "playlist-btn"
- tapOn:
    id: "modal-confirm"

# Assert name modal
- assertVisible: "Playlist Name"

# Cancel name modal
- tapOn:
    id: "modal-cancel"

# Assert modal dismissed — still on CardQueueScreen
- assertVisible: "Playlist"

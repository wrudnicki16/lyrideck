appId: host.exp.exponent
---
# Journey 3a: Select a track for a card
# Precondition: Deck with pending cards exists, Spotify connected
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Connect to Spotify (fails if not already authenticated)
- tapOn:
    id: "connect-spotify"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: "50%,79%"
    optional: true

# Navigate to first deck
- tapOn:
    id: "deck-item"
    index: 0

# Tap a pending card to go to SongCandidatesScreen
- tapOn:
    id: "filter-pending"
- tapOn:
    id: "card-item"
    index: -1

# Assert SongCandidatesScreen elements
- assertVisible: "Search Spotify..."

# Wait for search results
- extendedWaitUntil:
    visible: "Select"
    timeout: 10000

# Tap Select on first track → CaptureScreen
- tapOn:
    id: "select-track"
    index: 0

# Assert CaptureScreen elements
- assertVisible: "Open in Spotify"
- assertVisible: "Mark Timestamp"
- assertVisible: "Mark at 0:00"

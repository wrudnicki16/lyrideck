appId: host.exp.exponent
---
# Journey 3e: Search for a different track
# Precondition: On CaptureScreen with a selected track
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Connect to Spotify (fails if not already authenticated)
- tapOn:
    id: "connect-spotify"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: "50%,79%"
    optional: true

# Navigate to first deck
- tapOn:
    id: "deck-item"
    index: 0
- tapOn:
    id: "filter-pending"
- tapOn:
    id: "card-item"
    index: -1
    optional: true

# If no "Select" visible, card is already matched — go to Matched tab instead
- runFlow:
    when:
      notVisible: "Select"
    commands:
      - tapOn:
          id: "filter-matched"
      - tapOn:
          id: "card-item"
          index: -1

# Wait for search results
- extendedWaitUntil:
    visible: "Select"
    timeout: 10000
- tapOn:
    id: "select-track"
    index: 0

# Assert on CaptureScreen
- assertVisible: "Search for different track"

# Tap "Search for different track"
- tapOn:
    id: "search-different-track"

# Assert back on SongCandidatesScreen
- assertVisible: "Search Spotify..."

# Modify search query
- tapOn:
    id: "input-search"
- eraseText: 100
- inputText: "different query"
- pressKey: enter

# Wait for new results
- extendedWaitUntil:
    visible: "Select"
    timeout: 10000

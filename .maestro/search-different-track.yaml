appId: host.exp.exponent
---
# Journey 3e: Search for a different track
# Precondition: On CaptureScreen with a selected track
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 5000
- openLink: "${EXPO_URL}"

# Connect to Spotify (fails if not already authenticated)
- tapOn: "Connect Spotify"
- extendedWaitUntil:
    visible: "Agree"
    timeout: 5000
    optional: true
- tapOn:
    text: "Agree"
    optional: true

# Navigate to CaptureScreen
- tapOn:
    text: ".*cards"
    index: 0
- tapOn: "Pending"
- tapOn:
    text: ".*"
    index: -1
- extendedWaitUntil:
    visible: "Select"
    timeout: 10000
- tapOn:
    text: "Select"
    index: 0

# Assert on CaptureScreen
- assertVisible: "Search for different track"

# Tap "Search for different track"
- tapOn: "Search for different track"

# Assert back on SongCandidatesScreen
- assertVisible: "Search Spotify..."

# Modify search query
- tapOn: "Search Spotify..."
- eraseText: 100
- inputText: "different query"
- pressKey: enter

# Wait for new results
- extendedWaitUntil:
    visible: "Select"
    timeout: 10000

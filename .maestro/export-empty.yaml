appId: host.exp.exponent
---
# Journey 6b: Export with no timestamps
# Precondition: Deck exists with no saved timestamps
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 30000
- openLink: "${EXPO_URL}"

# Dismiss Expo Go developer menu
- extendedWaitUntil:
    visible: "Continue"
    timeout: 5000
    optional: true
- tapOn:
    point: "90%,35%"
    optional: true

# Navigate to first deck
- tapOn:
    id: "deck-item"
    index: 0

# Tap "Export" button
- tapOn:
    id: "export-btn"

# Assert ExportScreen with zero timestamps
- assertVisible: "0 timestamps to export"

# Tap "Export CSV"
- tapOn:
    id: "export-csv"

# Assert "Nothing to export" alert
- assertVisible: "Nothing to export"
- assertVisible: "No timestamps saved yet."
- tapOn: "OK"
